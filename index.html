<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generador IA</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:90%;
max-width:700px;
}

textarea{
width:100%;
height:150px;
padding:15px;
border-radius:15px;
border:none;
font-size:16px;
}

button{
width:100%;
margin-top:20px;
padding:15px;
border:none;
border-radius:15px;
background:#00bfff;
color:white;
font-size:18px;
cursor:pointer;
}

img{
width:100%;
margin-top:30px;
border-radius:20px;
}

</style>

</head>
<body>

<div class="container">

<h1>Generador IA</h1>

<textarea id="prompt"
placeholder="Describe la imagen"></textarea>

<button onclick="generateImage()">
Generar Imagen IA
</button>

<img id="image"/>

</div>

<script>

const HF_TOKEN = "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";

async function generateImage(){

const prompt =
document.getElementById("prompt").value;

try{

const response = await fetch(
"https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0",
{
method:"POST",
headers:{
Authorization:`Bearer ${HF_TOKEN}`,
"Content-Type":"application/json"
},
body:JSON.stringify({
inputs:prompt
})
}
);

console.log(response);

if(!response.ok){

const errorText = await response.text();

alert(errorText);

console.log(errorText);

return;

}

const blob = await response.blob();

const imageUrl = URL.createObjectURL(blob);

document.getElementById("image").src = imageUrl;

}catch(error){

console.log(error);

alert(error.message);

}

}

</script>

</body>
</html>
